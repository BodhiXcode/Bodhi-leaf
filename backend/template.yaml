AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bodhi Leaf Backend - Commerce Copilot API

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        AWS_REGION_NAME: us-east-1
        BEDROCK_MODEL_ID: us.amazon.nova-micro-v1:0

Resources:
  BodhiLeafFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.main.handler
      CodeUri: .
      Description: Bodhi Leaf API - Bedrock insights + Polly TTS
      Architectures:
        - x86_64
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
            ApiId: !Ref BodhiLeafApi
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "arn:aws:bedrock:*::foundation-model/*"
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: "*"

  BodhiLeafApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${BodhiLeafApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BodhiLeafFunction.Arn
