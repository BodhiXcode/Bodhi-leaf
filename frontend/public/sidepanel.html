<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodhi Leaf — Commerce Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="sidepanel/sidepanel.css">
</head>

<body>
    <div id="container">
        <!-- Header -->
        <header id="header">
            <div class="header-brand">
                <img class="header-icon" src="icons/icon-48.png" alt="Bodhi Leaf" />
                <div>
                    <h1 class="header-title">Bodhi Leaf</h1>
                    <p class="header-sub">Commerce Copilot</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="zen-btn" class="zen-disabled" aria-disabled="true">
                    <svg class="zen-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    Zen
                </button>
                <button id="lbtn">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Scan
                </button>
                <button id="close-btn" title="Close panel"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
        </header>

        <!-- Status -->
        <div id="status">
            <span class="status-icon">🔍</span>
            Open an Amazon product page and tap <strong>Scan Page</strong> to begin.
        </div>

        <!-- Skeleton loader -->
        <div id="skeleton" style="display:none">
            <div class="skel-card">
                <div class="skel-line skel-line--title"></div>
                <div class="skel-line skel-line--body"></div>
                <div class="skel-line skel-line--body skel-line--short"></div>
            </div>
            <div class="skel-card">
                <div class="skel-line skel-line--title"></div>
                <div class="skel-line skel-line--body"></div>
            </div>
            <div class="skel-card">
                <div class="skel-line skel-line--title"></div>
                <div class="skel-line skel-line--body"></div>
                <div class="skel-line skel-line--body skel-line--short"></div>
                <div class="skel-line skel-line--body"></div>
            </div>
        </div>

        <!-- Data cards -->
        <section id="data-cards">
            <!-- Product image -->
            <div class="card" id="card-image" style="display:none">
                <img id="val-image" class="product-image" src="" alt="Product" />
            </div>

            <!-- Title & brand -->
            <div class="card" id="card-title" style="display:none">
                <div class="card-label">Product</div>
                <div class="card-value card-value--title" id="val-title"></div>
                <div class="card-meta-brand" id="val-brand"></div>
            </div>

            <!-- Price block -->
            <div class="card" id="card-price" style="display:none">
                <div class="card-label">Price</div>
                <div class="price-row">
                    <span class="card-value card-value--price" id="val-price"></span>
                    <span class="price-mrp" id="val-mrp"></span>
                    <span class="price-savings" id="val-savings"></span>
                </div>
                <div id="val-deal"></div>
                <div id="val-coupon"></div>
                <div id="val-emi"></div>
            </div>

            <!-- Availability & delivery -->
            <div class="card" id="card-availability" style="display:none">
                <div class="card-label">Availability</div>
                <div class="availability-badge" id="val-availability"></div>
                <div class="delivery-info" id="val-delivery"></div>
                <div class="delivery-info" id="val-fastest-delivery"></div>
            </div>

            <!-- Features -->
            <div class="card" id="card-features" style="display:none">
                <div class="card-label">Key Features</div>
                <ul class="feature-list" id="val-features"></ul>
            </div>

            <!-- Ratings -->
            <div class="card" id="card-rating" style="display:none">
                <div class="card-label">Ratings</div>
                <div class="rating-hero">
                    <span class="rating-big" id="val-rating-value"></span>
                    <div class="rating-right">
                        <div class="rating-stars" id="val-rating-stars"></div>
                        <span class="rating-count" id="val-rating-count"></span>
                    </div>
                </div>
                <div class="rating-histogram" id="rating-histogram"></div>
                <div class="rating-filters" id="rating-filters"></div>
            </div>

            <!-- AI Insights -->
            <div class="card" id="card-insights" style="display:none">
                <div class="card-label">AI Insights</div>
                <div class="insights-deal-score" id="insights-deal-score"></div>
                <div class="insights-pros-cons">
                    <div class="insights-group insights-pros">
                        <div class="insights-group-title insights-pro-title">Pros</div>
                        <ul class="insights-list" id="insights-pros-list"></ul>
                    </div>
                    <div class="insights-group insights-cons">
                        <div class="insights-group-title insights-con-title">Cons</div>
                        <ul class="insights-list" id="insights-cons-list"></ul>
                    </div>
                </div>
            </div>

            <!-- Reviews -->
            <div class="card" id="card-reviews" style="display:none">
                <div class="card-label">Customer Reviews</div>
                <div class="reviews-list" id="val-reviews"></div>
            </div>

            <!-- Technical details -->
            <div class="card" id="card-specs" style="display:none">
                <div class="card-label">Technical Details</div>
                <table class="specs-table" id="val-specs"></table>
            </div>

            <!-- Seller info -->
            <div class="card" id="card-seller" style="display:none">
                <div class="card-label">Sold by</div>
                <div class="card-value" id="val-seller"></div>
            </div>
        </section>
    </div>
    <script src="sidepanel/sidepanel.js"></script>
</body>

</html>
